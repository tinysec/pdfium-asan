name: build

on:
  push:
    tags: ["v*", "chrome-*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Chrome version (e.g. 149.0.7827.156). Tags the release chrome-<version>. Leave empty for a build-only run."
        required: false

env:
  # The Chrome-locked PDFium SHA lives in chrome.lock (written by track.yml).
  PDFIUM_REPO: https://pdfium.googlesource.com/pdfium.git
  # Use the locally-installed MSVC toolchain on Windows instead of trying to
  # download Google's private Chrome toolchain (which needs auth and fails in CI).
  DEPOT_TOOLS_WIN_TOOLCHAIN: "0"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        # PDFium ships one libFuzzer target; ASAN via the GN toolchain. Both
        # platforms use GN + depot_tools. (No AFL++ leg: AFL++ is Linux-native,
        # and GN's clang is hard to retarget to afl-clang-fast.)
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Free up disk space (Linux)
        if: runner.os == 'Linux'
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Read Chrome-locked revision from chrome.lock
        id: lock
        shell: bash
        run: |
          echo "sha=$(jq -r .sha chrome.lock)" >> "$GITHUB_OUTPUT"

      - name: Enable long path support (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # PDFium's checkout paths can exceed the 260-char Windows limit.
          git config --global core.longpaths true
          $key = 'HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem'
          New-ItemProperty -Path $key -Name LongPathsEnabled -Value 1 -PropertyType DWord -Force | Out-Null

      - name: Install depot_tools
        shell: bash
        run: |
          git clone --depth 1 https://chromium.googlesource.com/chromium/tools/depot_tools.git
          echo "$PWD/depot_tools" >> "$GITHUB_PATH"

      - name: gclient sync (Linux)
        if: runner.os == 'Linux'
        run: |
          gclient config --unmanaged "$PDFIUM_REPO"
          gclient sync --no-history --shallow
          cd pdfium
          git fetch --depth 1 origin "${{ steps.lock.outputs.sha }}"
          git checkout FETCH_HEAD
          gclient sync --no-history --shallow
          gclient runhooks

      - name: gclient sync (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          gclient config --unmanaged "$env:PDFIUM_REPO"
          gclient sync --no-history --shallow
          Push-Location pdfium
          git fetch --depth 1 origin "${{ steps.lock.outputs.sha }}"
          git checkout FETCH_HEAD
          gclient sync --no-history --shallow
          gclient runhooks
          Pop-Location

      - name: Generate build config and build all fuzzer targets (Linux)
        if: runner.os == 'Linux'
        working-directory: pdfium
        run: |
          gn gen out/Fuzz --args='
            is_debug=false
            is_asan=true
            use_libfuzzer=true
            pdf_is_standalone=true
            clang_use_chrome_plugins=false
            treat_warnings_as_errors=false
            # Emit full debug info; on Windows this produces a .pdb next to the
            # binary so ASAN stack traces resolve to file:line.
            symbol_level=1
          '
          # Chrome-150 PDFium dropped the single pdfium_fuzzer umbrella target;
          # "fuzzers" is the group that aggregates every *_fuzzer executable.
          ninja -C out/Fuzz fuzzers

      - name: Generate build config and build all fuzzer targets (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: pdfium
        run: |
          gn gen out/Fuzz --args='is_debug=false is_asan=true use_libfuzzer=true pdf_is_standalone=true clang_use_chrome_plugins=false treat_warnings_as_errors=false symbol_level=1'
          ninja -C out/Fuzz fuzzers

      - name: Smoke test (one empty run per fuzzer)
        shell: bash
        working-directory: pdfium
        run: |
          # One short run per produced fuzzer binary; skip Windows .pdb sidecars.
          for BIN in out/Fuzz/*_fuzzer*; do
            [ -e "$BIN" ] || continue
            case "$BIN" in *.pdb|*.o|*.obj|*.a|*.lib|*.ninja*) continue;; esac
            "$BIN" -runs=1 >/dev/null 2>&1 || true
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pdfium-libfuzzer-${{ runner.os }}
          path: pdfium/out/Fuzz/*_fuzzer*
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.version != '')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            echo "tag=chrome-${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: artifacts/**/*
