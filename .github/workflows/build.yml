name: build

on:
  push:
    tags: ["v*", "chrome-*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Chrome version (e.g. 149.0.7827.156). Tags the release chrome-<version>. Leave empty for a build-only run."
        required: false

env:
  # The Chrome-locked PDFium SHA lives in chrome.lock (written by track.yml).
  PDFIUM_REPO: https://pdfium.googlesource.com/pdfium.git
  # Use the locally-installed MSVC toolchain on Windows instead of trying to
  # download Google's private Chrome toolchain (which needs auth and fails in CI).
  DEPOT_TOOLS_WIN_TOOLCHAIN: "0"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        # PDFium ships one libFuzzer target; ASAN via the GN toolchain. Both
        # platforms use GN + depot_tools. (No AFL++ leg: AFL++ is Linux-native,
        # and GN's clang is hard to retarget to afl-clang-fast.)
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Free up disk space (Linux)
        if: runner.os == 'Linux'
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Read Chrome-locked revision from chrome.lock
        id: lock
        shell: bash
        run: |
          echo "sha=$(jq -r .sha chrome.lock)" >> "$GITHUB_OUTPUT"

      - name: Enable long path support (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # PDFium's checkout paths can exceed the 260-char Windows limit.
          git config --global core.longpaths true
          $key = 'HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem'
          New-ItemProperty -Path $key -Name LongPathsEnabled -Value 1 -PropertyType DWord -Force | Out-Null

      - name: Install depot_tools
        shell: bash
        run: |
          git clone --depth 1 https://chromium.googlesource.com/chromium/tools/depot_tools.git
          # $PWD is Unix-style (/d/a/...) under Git-bash on Windows, which pwsh
          # cannot resolve as a PATH entry. $GITHUB_WORKSPACE is always a native
          # path (D:\a\... on Windows, /home/runner/... on Linux), so it works
          # for both the pwsh and bash gclient steps that follow.
          echo "$GITHUB_WORKSPACE/depot_tools" >> "$GITHUB_PATH"

      - name: gclient sync (Linux)
        if: runner.os == 'Linux'
        run: |
          gclient config --unmanaged "$PDFIUM_REPO"
          gclient sync --no-history --shallow
          cd pdfium
          git fetch --depth 1 origin "${{ steps.lock.outputs.sha }}"
          git checkout FETCH_HEAD
          gclient sync --no-history --shallow
          gclient runhooks

      - name: gclient sync (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          gclient config --unmanaged "$env:PDFIUM_REPO"
          gclient sync --no-history --shallow
          Push-Location pdfium
          git fetch --depth 1 origin "${{ steps.lock.outputs.sha }}"
          git checkout FETCH_HEAD
          gclient sync --no-history --shallow
          gclient runhooks
          Pop-Location

      - name: Generate build config (ASAN, Linux)
        if: runner.os == 'Linux'
        working-directory: pdfium
        run: |
          gn gen out/Fuzz --args='
            is_debug=false
            is_asan=true
            pdf_is_standalone=true
            clang_use_chrome_plugins=false
            treat_warnings_as_errors=false
            symbol_level=1
          '

      - name: Generate build config (ASAN, Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: pdfium
        run: |
          gn gen out/Fuzz --args='is_debug=false is_asan=true pdf_is_standalone=true clang_use_chrome_plugins=false treat_warnings_as_errors=false symbol_level=1'

      - name: Build pdfium_test + archive libpdfium
        working-directory: pdfium
        shell: bash
        run: |
          mkdir -p dist/lib/include dist/fuzz

          # PDFium standalone ships NO fuzzer executables by design
          # (testing/fuzzers/BUILD.gn: "It does not link and create fuzzer
          # executables. That is done in Chromium."). So:
          #  * pdfium_test -- the standalone, own-main() ASAN PDF renderer. This
          #    is the ready-to-fuzz target (WinAFL drives it directly, no harness
          #    needed). A true libFuzzer pdfium binary needs GN executable
          #    injection and is a follow-up.
          #  * libpdfium -- `pdfium` is a component()/source_set, so there is no
          #    single .a produced; we archive the compiled objects (excluding the
          #    testing/ tree) into one static library for linking a harness.
          # Do NOT set use_libfuzzer=true: it adds -fsanitize=fuzzer globally,
          # which clashes with pdfium_test's own main().
          ninja -C out/Fuzz pdfium_test

          # Archive the compiled objects into one static lib. On Linux use the
          # system 'ar' (always present via binutils/build-essential); pdfium's
          # clang-built objects are normal ELF .o files, so plain ar suffices
          # without pulling in the llvm tools package. On Windows pdfium is
          # built with the LLVM toolchain, so use llvm-lib there.
          AR=ar
          if [ "$RUNNER_OS" = "Windows" ]; then AR=llvm-lib; fi
          OBJEXT=o
          if [ "$RUNNER_OS" = "Windows" ]; then OBJEXT=obj; fi

          # Collect every compiled object except the testing/ tree, then archive.
          find out/Fuzz/obj -type f -name "*.${OBJEXT}" \
            ! -path "*/testing/*" -print0 \
            | xargs -0 "$AR" rcs dist/lib/libpdfium.a

          # Ship the pdfium_test executable and its public API headers.
          find out/Fuzz -maxdepth 1 -type f \
            \( -name 'pdfium_test' -o -name 'pdfium_test.exe' -o -name 'pdfium_test*.pdb' \) \
            -exec cp {} dist/fuzz/ \;
          cp public/*.h dist/lib/include/ 2>/dev/null || true
          ls -la dist/lib dist/lib/include dist/fuzz

      - name: Verify artifacts
        working-directory: pdfium
        shell: bash
        run: |
          STAT=dist/lib/libpdfium.a
          FZ=$(find dist/fuzz -maxdepth 1 -type f \( -name 'pdfium_test' -o -name 'pdfium_test.exe' \) | head -1)
          test -s "$STAT" || { echo "ERROR: libpdfium.a missing or empty"; exit 1; }
          test -n "$FZ"   || { echo "ERROR: pdfium_test missing"; exit 1; }
          echo "static-lib: $STAT"
          echo "pdfium_test: $FZ"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pdfium-asan-${{ runner.os }}
          path: pdfium/dist
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.version != '')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            echo "tag=chrome-${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: artifacts/**/*
